# Lightweight Docker Compose for Base Payment Channel E2E Tests
# Only runs infrastructure - connectors are started by npm in the test
#
# Usage:
#   Start: docker compose -f docker-compose-base-e2e-lite.yml up -d
#   Stop:  docker compose -f docker-compose-base-e2e-lite.yml down -v

version: '3.8'

services:
  # Anvil - Base Sepolia Fork
  anvil_e2e_lite:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: anvil_e2e_lite
    entrypoint: ["anvil"]
    command:
      - --host=0.0.0.0
      - --port=8545
      - --fork-url=${BASE_SEPOLIA_RPC_URL:-https://sepolia.base.org}
      - --fork-block-number=${FORK_BLOCK_NUMBER:-20702367}
      - --chain-id=84532
      - --accounts=10
      - --balance=10000
      - --block-time=1
      - --gas-limit=30000000
    ports:
      - "8545:8545"
    networks:
      - e2e-lite-network
    healthcheck:
      test: ["CMD-SHELL", "cast block-number --rpc-url http://localhost:8545 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 10s

  # Contract Deployer
  contract_deployer_lite:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: contract_deployer_lite
    depends_on:
      anvil_e2e_lite:
        condition: service_healthy
    networks:
      - e2e-lite-network
    working_dir: /contracts
    volumes:
      - ./packages/contracts:/contracts
    command: >
      sh -c "
        echo '🔧 Deploying contracts...';
        forge script script/DeployLocal.s.sol:DeployLocalScript \
          --rpc-url http://anvil_e2e_lite:8545 \
          --private-key 0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80 \
          --broadcast \
          --skip-simulation || exit 1;
        echo '✅ Deployed:';
        echo '  Token:    0x5FbDB2315678afecb367f032d93F642f64180aa3';
        echo '  Registry: 0xe7f1725E7734CE288F8367e1Bb143E90bb3F0512';
        sleep infinity;
      "

  # TigerBeetle - Accounting database
  tigerbeetle_lite:
    image: ghcr.io/tigerbeetle/tigerbeetle:0.16.68
    container_name: tigerbeetle_lite
    security_opt:
      - seccomp=unconfined
    cap_add:
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - tigerbeetle-lite-data:/data
      - ./scripts/init-tigerbeetle.sh:/init-tigerbeetle.sh:ro
    networks:
      - e2e-lite-network
    ports:
      - "3000:3000"
    entrypoint: ["/init-tigerbeetle.sh"]
    environment:
      TIGERBEETLE_CLUSTER_ID: "0"
      TIGERBEETLE_REPLICA_COUNT: "1"
      TIGERBEETLE_DATA_DIR: /data
    mem_limit: 4g
    cpus: '1.0'

  # Token Faucet
  token_faucet_lite:
    image: ghcr.io/foundry-rs/foundry:latest
    container_name: token_faucet_lite
    depends_on:
      anvil_e2e_lite:
        condition: service_healthy
      contract_deployer_lite:
        condition: service_started
    networks:
      - e2e-lite-network
    volumes:
      - ./scripts/token-faucet.sh:/faucet.sh:ro
      - ./packages/contracts:/contracts:ro
    environment:
      - ANVIL_RPC_URL=http://anvil_e2e_lite:8545
      - FAUCET_PRIVATE_KEY=0xac0974bec39a17e36ba4a6b4d238ff944bacb478cbed5efcae784d7bf4f2ff80
      - FAUCET_AMOUNT=1000000000000000000000
    entrypoint: ["/bin/sh", "/faucet.sh"]
    ports:
      - "8546:8546"

networks:
  e2e-lite-network:
    driver: bridge

volumes:
  tigerbeetle-lite-data:
    driver: local
